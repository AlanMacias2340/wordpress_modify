<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordPress Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; }
        .container { max-width: 400px; margin: 3rem auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        .row { margin-bottom: 1rem; display: flex; flex-direction: column; }
        .row label { margin-bottom: 0.5rem; font-weight: bold; }
        .row input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        fieldset { border: 1px solid #ccc; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
        legend { padding: 0 0.5rem; font-weight: bold; }
        .btn { width: 100%; padding: 0.75rem; border: none; background: #007BFF; color: white; font-size: 1rem; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        #result { margin-top: 1rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connect to WordPress</h1>
        <form id="loginForm" action="/login" method="post" onsubmit="return false;">
            <div class="row">
                <label for="wp_url">WordPress URL:</label>
                <input type="text" id="wp_url" name="wp_url" placeholder="https://example.com" required>
            </div>
            <!-- username/password removed; only URL and optional WC credentials needed -->
            <fieldset>
                <legend>WooCommerce API (optional)</legend>
                <div class="row">
                    <label for="consumer_key">Consumer Key:</label>
                    <input type="text" id="consumer_key" name="consumer_key">
                </div>
                <div class="row">
                    <label for="consumer_secret">Consumer Secret:</label>
                    <input type="text" id="consumer_secret" name="consumer_secret">
                </div>
            </fieldset>
            <button type="submit" class="btn">Connect</button>
        </form>
        <div id="result" style="margin-top:1rem;color:#d00;"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const resultDiv = document.getElementById('result');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = new FormData(form);
                const resp = await fetch('/login', {
                    method: 'POST',
                    body: data
                });
                const json = await resp.json();
                if (resultDiv) {
                    resultDiv.textContent = '';
                }
                // always store the URL (and any credentials) for later use
                localStorage.setItem('wp_url', document.getElementById('wp_url').value);
                const ck = document.getElementById('consumer_key').value;
                const cs = document.getElementById('consumer_secret').value;
                if (ck) {
                    localStorage.setItem('consumer_key', ck);
                }
                if (cs) {
                    localStorage.setItem('consumer_secret', cs);
                }
                // redirect when the POST succeeded (we don't need WooCommerce results for navigation)
                if (resp.ok && !json.site_error) {
                    window.location.href = '/products_html';
                    return;
                }
                // otherwise show whatever useful info (errors or site status)
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(json, null, 2);
                resultDiv.appendChild(pre);
            });
        });
    </script>
</body>
</html>
