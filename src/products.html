<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        h1 { color: #333; }
        .product { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; }
        .product h2 { margin: 0 0 0.5rem; }
    </style>
</head>
<body>
    <h1>Product List</h1>
    <div id="products"></div>
    <script>
        async function loadProducts() {
            const wpUrl = localStorage.getItem('wp_url');
            const consumerKey = localStorage.getItem('consumer_key');
            const consumerSecret = localStorage.getItem('consumer_secret');
            if (!wpUrl) {
                document.getElementById('products').textContent = 'Missing connection data.';
                return;
            }
            const params = new URLSearchParams({
                wp_url: wpUrl,
                consumer_key: consumerKey || '',
                consumer_secret: consumerSecret || ''
            });
            const resp = await fetch('/products?' + params.toString());
            const json = await resp.json();
            const container = document.getElementById('products');
            if (json.woocommerce && json.woocommerce.body) {
                json.woocommerce.body.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product';
                    div.innerHTML = `<h2>${p.name || '(no name)'}</h2><p>Price: ${p.price || 'n/a'}</p>`;
                    container.appendChild(div);
                });
            } else {
                container.textContent = 'Unable to fetch products.';
            }
        }
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
