<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; color: #333; margin: 0; }
        header { background: #007BFF; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: bold; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-top: 0; }
        /* list mode: products displayed one per line */
        .products-grid { display: block; }
        /* box around the list */
        #products { border: 1px solid #ccc; padding: 1rem; background: #fff; border-radius: 6px; max-height: 60vh; overflow-y: auto; }
        .product { background: #fff; border-radius: 4px; padding: 0.75rem; margin-bottom: 0.5rem;
                    box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .product h2 { margin: 0 0 0.25rem; font-size: 1rem; }
        .product p { margin: 0; }
        header .nav { display: flex; gap: 1rem; align-items: center; }
    </style>
</head>
<body>
    <header>
        <div class="nav">
            <a href="/products_html" style="text-decoration:underline;">Product List</a>
            <a href="/search">Product Search</a>
        </div>
        <a href="/login" id="backLink">&larr; Back</a>
    </header>
    <div class="container">
        <h1>Products</h1>
        <div class="filter" style="margin-bottom:1rem;">
            <input type="text" id="skuInput" placeholder="Enter SKU to filter" style="padding:0.5rem; width:200px;" />
            <button id="skuBtn" class="btn" style="margin-left:0.5rem;">Search</button>
            <button id="allBtn" class="btn" style="margin-left:0.5rem;">Show All</button>
        </div>
        <div id="products" class="products-grid"></div>
    <script>
        async function loadProducts(sku=null) {
            const wpUrl = localStorage.getItem('wp_url');
            const consumerKey = localStorage.getItem('consumer_key');
            const consumerSecret = localStorage.getItem('consumer_secret');
            const container = document.getElementById('products');
            container.textContent = '';
            if (!wpUrl) {
                container.textContent = 'Missing connection data.';
                return;
            }
            const params = new URLSearchParams({
                wp_url: wpUrl,
                consumer_key: consumerKey || '',
                consumer_secret: consumerSecret || ''
            });
            if (sku) {
                params.set('sku', sku);
            }
            const resp = await fetch('/products?' + params.toString());
            const json = await resp.json();
            if (json.woocommerce && json.woocommerce.body) {
                if (Array.isArray(json.woocommerce.body) && json.woocommerce.body.length === 0) {
                    container.textContent = 'No products match the given SKU.';
                    return;
                }
                json.woocommerce.body.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product';
                    div.innerHTML = `<h2>${p.name || '(no name)'}</h2>\n                            <p>Price: ${p.price || 'n/a'}</p>`;
                    container.appendChild(div);
                });
            } else {
                container.textContent = 'Unable to fetch products.';
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            document.getElementById('skuBtn').addEventListener('click', () => {
                const sku = document.getElementById('skuInput').value.trim();
                if (sku) {
                    loadProducts(sku);
                }
            });
            document.getElementById('allBtn').addEventListener('click', () => {
                document.getElementById('skuInput').value = '';
                loadProducts();
            });
        });
    </script>
</body>
</html>
