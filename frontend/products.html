<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; color: #333; margin: 0; }
        header { background: #007BFF; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: bold; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-top: 0; }
        /* list mode: products displayed one per line */
        .products-grid { display: block; }
        /* box around the list */
        #products { border: 1px solid #ccc; padding: 1rem; background: #fff; border-radius: 6px; max-height: 60vh; overflow-y: auto; }
        .product { background: #fff; border-radius: 4px; padding: 0.75rem; margin-bottom: 0.5rem;
                    box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .product h2 { margin: 0 0 0.25rem; font-size: 1rem; }
        .product p { margin: 0; }
        header .nav { display: flex; gap: 1rem; align-items: center; }
    </style>
</head>
<body>
    <header>
        <div class="nav">
            <a href="/products_html" style="text-decoration:underline;">Product List</a>
            <a href="/search">Product Search</a>
        </div>
        <a href="/login" id="backLink">&larr; Back</a>
    </header>
    <div class="container">
        <h1>Products</h1>
        <div class="filter" style="margin-bottom:1rem; display:flex; gap:0.5rem; align-items:center;">
            <select id="categorySelect" style="padding:0.5rem;">
                <option value="">All categories</option>
            </select>
            <input type="text" id="skuInput" placeholder="Enter SKU to filter" style="padding:0.5rem; width:200px;" />
            <button id="skuBtn" class="btn" style="margin-left:0.5rem;">Search</button>
            <button id="allBtn" class="btn" style="margin-left:0.5rem;">Show All</button>
        </div>
        <div id="split-container" style="display:flex; gap:1rem;">
            <div id="leftBox" style="flex:1;">
                <h2>In category</h2>
                <div id="leftProducts" class="products-grid"></div>
            </div>
            <div id="rightBox" style="flex:1;">
                <h2>Other products</h2>
                <div id="rightProducts" class="products-grid"></div>
            </div>
        </div>
    <script>
        async function loadProducts(sku=null, category=null) {
            const wpUrl = localStorage.getItem('wp_url');
            const consumerKey = localStorage.getItem('consumer_key');
            const consumerSecret = localStorage.getItem('consumer_secret');
            const leftContainer = document.getElementById('leftProducts');
            const rightContainer = document.getElementById('rightProducts');
            leftContainer.textContent = '';
            rightContainer.textContent = '';
            if (!wpUrl) {
                leftContainer.textContent = rightContainer.textContent = 'Missing connection data.';
                return;
            }
            // always fetch all products (ignore category param for request)
            const params = new URLSearchParams({
                wp_url: wpUrl,
                consumer_key: consumerKey || '',
                consumer_secret: consumerSecret || ''
            });
            if (sku) {
                params.set('sku', sku);
            }
            const resp = await fetch('/products?' + params.toString());
            const json = await resp.json();
            if (json.woocommerce && json.woocommerce.body && Array.isArray(json.woocommerce.body)) {
                const all = json.woocommerce.body;
                let inCat = all;
                if (category) {
                    inCat = all.filter(p => Array.isArray(p.categories) && p.categories.some(c => String(c.id) === String(category) || c.slug === category));
                }
                const notInCat = all.filter(p => !inCat.includes(p));
                const render = (p, container) => {
                    const div = document.createElement('div');
                    div.className = 'product';
                    div.innerHTML = `<h2>${p.name || '(no name)'}</h2>\n                            <p>Price: ${p.price || 'n/a'}</p>\n                            <p>Status: ${p.status || 'unknown'}</p>\n                            <p>Visibility: ${p.catalog_visibility || 'unknown'}</p>`;
                    container.appendChild(div);
                };
                if (inCat.length === 0 && category) {
                    leftContainer.textContent = 'No products in selected category.';
                } else {
                    inCat.forEach(p => render(p, leftContainer));
                }
                if (notInCat.length === 0) {
                    rightContainer.textContent = 'No other products.';
                } else {
                    notInCat.forEach(p => render(p, rightContainer));
                }
            } else {
                leftContainer.textContent = rightContainer.textContent = 'Unable to fetch products.';
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            // fetch categories and populate select
            const wpUrl = localStorage.getItem('wp_url');
            const consumerKey = localStorage.getItem('consumer_key');
            const consumerSecret = localStorage.getItem('consumer_secret');
            if (wpUrl && consumerKey && consumerSecret) {
                const params = new URLSearchParams({
                    wp_url: wpUrl,
                    consumer_key: consumerKey,
                    consumer_secret: consumerSecret,
                });
                fetch('/categories?' + params.toString())
                    .then(r => r.json())
                    .then(json => {
                        const select = document.getElementById('categorySelect');
                        if (json.woocommerce && Array.isArray(json.woocommerce.body)) {
                            json.woocommerce.body.forEach(cat => {
                                const opt = document.createElement('option');
                                opt.value = cat.id || cat.slug || '';
                                opt.textContent = cat.name || cat.slug || '(unnamed)';
                                select.appendChild(opt);
                            });
                        }
                    });
            }

            document.getElementById('skuBtn').addEventListener('click', () => {
                const sku = document.getElementById('skuInput').value.trim();
                const category = document.getElementById('categorySelect').value;
                loadProducts(sku, category || null);
            });
            document.getElementById('allBtn').addEventListener('click', () => {
                document.getElementById('skuInput').value = '';
                document.getElementById('categorySelect').value = '';
                loadProducts();
            });
        });
    </script>
</body>
</html>
